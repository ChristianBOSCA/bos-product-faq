# Netlify config for the Bells of Steel Product FAQ.
# The site root contains index.html; serverless functions live in netlify/functions.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Single-page app: unknown paths fall back to index.html (but never the function path).
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
