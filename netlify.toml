# Netlify config for the Bells of Steel Product FAQ.
# The site root contains index.html; serverless functions live in netlify/functions.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Daily pull of the ClickUp #product_knowledge channel into the FAQ sheet.
[functions."clickup-ingest"]
  schedule = "@daily"

# Single-page app: unknown paths fall back to index.html.
# (Function calls at /.netlify/functions/* are served natively before this rule,
# and real static files are served before it too, so this is safe.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
